<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz presentation</title>
    <link rel="stylesheet" href="/src/css/styles.css" />
    <link rel="stylesheet" href="/src/css/quiz.css" />
  </head>
  <body class="quiz-page quiz-present">
    <div id="app" hidden>
      <div id="fit">
        <div id="stage" class="quiz-stage quiz-stage--present" data-present-layout="split">
          <video id="quiz-bg-video" class="quiz-bg-video" muted playsinline autoplay loop hidden></video>

          <div class="quiz-present-banner">
            <div class="quiz-present-banner__title" id="quiz-title">Quiz</div>
            <div class="quiz-present-banner__sub muted" id="quiz-sub"></div>
            <img id="quiz-logo" alt="" style="display: none" />
          </div>

          <div class="quiz-present-grid">
            <section class="quiz-present-left">
              <div id="quiz-media" class="quiz-present-media"></div>
              <div class="quiz-present-brand">
                <div class="quiz-present-brand__logo" id="quiz-present-brandmark" hidden>Brand</div>
              </div>
            </section>

            <section class="quiz-present-right">
              <div class="quiz-present-right__content">
                <div class="quiz-present-meta">
                  <div id="quiz-seq-kind" class="quiz-present-kind">Question N / N</div>
                </div>
                <h1 id="quiz-seq-title" class="quiz-present-question"></h1>
                <p id="quiz-seq-body" class="quiz-present-body"></p>
                <div id="quiz-answers" class="quiz-present-input" hidden></div>
              </div>
              <div class="quiz-present-footer">
                <div></div>
                <button type="button" class="quiz-present-submit" disabled>Submit</button>
                <a
                  id="quiz-powered"
                  class="powered-by-rn"
                  href="https://realnation.co.uk"
                  target="_blank"
                  rel="noopener noreferrer"
                  aria-label="Powered by Real Nation"
                >
                  <img src="/play/powered-by-real-nation.png" alt="Powered by Real Nation" loading="lazy" decoding="async" />
                </a>
              </div>
            </section>
          </div>
        </div>
      </div>
    </div>

    <div id="quiz-error" class="player-error" hidden>
      <div>
        <h2>Could not load</h2>
        <p class="muted" id="quiz-error-msg"></p>
      </div>
    </div>

    <script type="module" src="/src/quiz/present.ts"></script>
  </body>
</html>
