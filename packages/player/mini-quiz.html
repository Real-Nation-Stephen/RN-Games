<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Mini quiz</title>
    <link rel="stylesheet" href="/src/page-module/page.css" />
  </head>
  <body>
    <div id="page-app" hidden>
      <div id="page-logo" class="page-logo" hidden></div>
      <div id="quiz-intro" class="page-card" style="width: min(520px, 100%)">
        <h1 id="page-headline" class="page-headline"></h1>
        <p id="page-body" class="page-body"></p>
        <button type="button" id="quiz-start" class="page-btn"></button>
      </div>
      <div id="quiz-question" class="page-card" hidden style="width: min(520px, 100%)">
        <p id="quiz-progress" class="page-quiz-progress"></p>
        <h2 id="quiz-prompt" class="page-headline"></h2>
        <div id="quiz-choices" class="page-quiz-choices"></div>
      </div>
      <div id="quiz-results" class="page-card page-thank-you" hidden style="width: min(520px, 100%)">
        <h2 id="results-headline" class="page-headline"></h2>
        <p id="results-body" class="page-body"></p>
        <p id="results-score" class="page-quiz-score"></p>
        <button type="button" id="quiz-continue" class="page-btn"></button>
      </div>
    </div>
    <p id="page-error" class="page-error" hidden></p>
    <a id="powered-by-rn" class="powered-by-rn" href="https://www.realnation.ie" target="_blank" rel="noopener noreferrer">
      <img src="/play/powered-by-real-nation.png" alt="Powered by Real Nation" loading="lazy" />
    </a>
    <script type="module" src="/src/mini-quiz/main.ts"></script>
  </body>
</html>
