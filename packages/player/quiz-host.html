<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz host</title>
    <link rel="stylesheet" href="/src/css/styles.css" />
    <link rel="stylesheet" href="/src/css/quiz.css" />
  </head>
  <body class="quiz-page quiz-host" data-quiz-surface="host">
    <div id="quiz-session-lost" class="quiz-banner" hidden>
      Session ended or was opened on another device. Start a new session to get a fresh room code.
    </div>
    <div id="app" hidden>
      <div id="fit">
        <div id="stage" class="quiz-stage">
          <video id="quiz-bg-video" class="quiz-bg-video" muted playsinline autoplay loop hidden></video>
          <div class="quiz-topbar">
            <div class="quiz-brand">
              <img id="quiz-logo" alt="" />
              <div>
                <div id="quiz-title" class="quiz-title">Quiz</div>
                <div id="quiz-sub" class="quiz-sub muted"></div>
              </div>
            </div>
            <div class="quiz-controls">
              <button id="quiz-create-session" class="btn btn-primary" type="button">Start session</button>
              <button id="quiz-lock-lobby" class="btn" type="button" disabled>Lock lobby (start game)</button>
              <button id="quiz-prev" class="btn" type="button">Prev</button>
              <button id="quiz-next" class="btn" type="button">Next</button>
            </div>
          </div>

          <div class="quiz-main">
            <div class="quiz-left">
              <div class="quiz-card">
                <div id="quiz-seq-kind" class="muted" style="font-size: 0.85rem"></div>
                <h1 id="quiz-seq-title" class="quiz-h1"></h1>
                <p id="quiz-seq-body" class="quiz-body"></p>
                <div id="quiz-media"></div>
                <div id="quiz-answers" class="quiz-answers" hidden></div>
              </div>
            </div>
            <div class="quiz-right">
              <div class="quiz-card quiz-card--join">
                <h3 style="margin: 0 0 8px">Join &amp; pop-outs</h3>
                <div class="muted" style="font-size: 0.9rem; line-height: 1.4; word-break: break-all">
                  Link: <code id="quiz-join-link"></code>
                </div>
                <div class="quiz-qr-wrap">
                  <img id="quiz-qr" alt="Scan to join" hidden style="max-width: 280px; width: 100%; height: auto; border-radius: 10px" />
                </div>
                <div class="quiz-popout-row">
                  <button id="quiz-open-present" type="button" class="btn btn-small" disabled>Presentation</button>
                  <button id="quiz-open-leaderboard" type="button" class="btn btn-small" disabled>Leaderboard</button>
                </div>
                <p id="quiz-lobby-hint" class="muted" style="margin: 10px 0 0; font-size: 0.82rem; line-height: 1.35"></p>
              </div>

              <div class="quiz-card" style="margin-top: 12px">
                <div class="quiz-players-head">
                  <h3 style="margin: 0">Players</h3>
                  <span class="muted quiz-players-count"><span id="quiz-participant-count">0</span> connected</span>
                </div>
                <div id="quiz-participants" class="quiz-participants-strip" aria-label="Connected players"></div>
              </div>

              <div class="quiz-card" style="margin-top: 12px">
                <h3 style="margin: 0 0 10px">Sequence list</h3>
                <ol id="quiz-seq-list" class="quiz-seq-list"></ol>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="quiz-error" class="player-error" hidden>
      <div>
        <h2>Could not load quiz</h2>
        <p class="muted" id="quiz-error-msg"></p>
      </div>
    </div>

    <script type="module" src="/src/quiz/host.ts"></script>
  </body>
</html>
