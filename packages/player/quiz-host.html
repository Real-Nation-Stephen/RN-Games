<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Quiz host</title>
    <link rel="stylesheet" href="/src/css/styles.css" />
    <link rel="stylesheet" href="/src/css/quiz.css" />
  </head>
  <body class="quiz-page quiz-host">
    <div id="app" hidden>
      <div id="fit">
        <div id="stage" class="quiz-stage">
          <video id="quiz-bg-video" class="quiz-bg-video" muted playsinline autoplay loop hidden></video>
          <div class="quiz-topbar">
            <div class="quiz-brand">
              <img id="quiz-logo" alt="" />
              <div>
                <div id="quiz-title" class="quiz-title">Quiz</div>
                <div id="quiz-sub" class="quiz-sub muted"></div>
              </div>
            </div>
            <div class="quiz-controls">
              <button id="quiz-create-session" class="btn btn-primary" type="button">Start session</button>
              <button id="quiz-prev" class="btn" type="button">Prev</button>
              <button id="quiz-next" class="btn" type="button">Next</button>
            </div>
          </div>

          <div class="quiz-main">
            <div class="quiz-left">
              <div class="quiz-card">
                <div id="quiz-seq-kind" class="muted" style="font-size: 0.85rem"></div>
                <h1 id="quiz-seq-title" class="quiz-h1"></h1>
                <p id="quiz-seq-body" class="quiz-body"></p>
                <div id="quiz-media"></div>
                <div id="quiz-answers" class="quiz-answers" hidden></div>
              </div>
            </div>
            <div class="quiz-right">
              <div class="quiz-card">
                <h3 style="margin: 0 0 10px">Join</h3>
                <div class="muted" style="font-size: 0.9rem; line-height: 1.4">
                  Link: <code id="quiz-join-link"></code>
                </div>
                <div style="margin-top: 10">
                  <img id="quiz-qr" alt="" style="max-width: 240px; width: 100%; height: auto; border-radius: 10px" />
                </div>
                <div class="muted" style="margin-top: 10; font-size: 0.85rem">
                  MVP: this screen drives sequences; play-along hooks in next.
                </div>
              </div>

              <div class="quiz-card" style="margin-top: 12">
                <h3 style="margin: 0 0 10px">Sequence list</h3>
                <ol id="quiz-seq-list" class="quiz-seq-list"></ol>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div id="quiz-error" class="player-error" hidden>
      <div>
        <h2>Could not load quiz</h2>
        <p class="muted" id="quiz-error-msg"></p>
      </div>
    </div>

    <script type="module" src="/src/quiz/host.ts"></script>
  </body>
</html>
