<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Course</title>
    <link rel="stylesheet" href="/src/course/course.css" />
  </head>
  <body>
    <div id="course-shell">
      <div id="app">
        <div id="course-loading" class="course-panel">Loading course…</div>
        <div id="course-error" class="course-panel course-error" hidden></div>

        <div id="course-home" hidden>
          <header class="course-hero">
            <div id="course-logo" class="course-logo" hidden></div>
            <h1 id="course-title"></h1>
            <p id="course-description" class="course-muted"></p>
            <div class="course-progress-wrap">
              <div class="course-progress-bar"><div id="course-progress-fill"></div></div>
              <span id="course-progress-label" class="course-muted"></span>
            </div>
          </header>

          <section id="course-resume" class="course-card" hidden>
            <h2 id="course-learning-title">Save your progress</h2>
            <p id="course-learning-intro" class="course-muted"></p>
            <div class="course-resume-row">
              <input id="course-resume-url" type="text" readonly />
              <button type="button" id="course-copy-link" class="course-btn course-btn-primary">Copy link</button>
            </div>
            <p id="course-resume-status" class="course-muted" hidden></p>
          </section>

          <section id="course-summary" class="course-card" hidden>
            <h2>Your achievements</h2>
            <ul id="course-cert-list"></ul>
          </section>

          <section id="course-badges" class="course-card" hidden>
            <h2>Your badges</h2>
            <div id="course-badge-grid" class="course-badge-grid"></div>
          </section>

          <div id="course-sections"></div>

          <div id="course-empty" class="course-card" hidden>
            <h2>Curriculum coming soon</h2>
            <p class="course-muted">This course does not have any items yet. Check back soon.</p>
          </div>

          <div id="course-complete" class="course-card course-complete-banner" hidden>
            <h2>Course complete</h2>
            <p class="course-muted">You have finished all items in this course.</p>
          </div>

          <footer id="course-powered" class="course-powered" hidden>
            Powered by <strong>Real Nation</strong>
          </footer>
        </div>

        <div id="course-player" hidden>
          <header class="course-player-header">
            <button type="button" id="course-back" class="course-btn">← Back to course</button>
            <span id="course-player-title"></span>
          </header>
          <iframe id="course-frame" title="Course item" allow="fullscreen"></iframe>
          <div id="course-item-loading" class="course-item-loading" hidden>
            <img id="course-item-loading-logo" class="course-item-loading-logo" alt="" hidden />
            <p id="course-item-loading-text" class="course-item-loading-text">Course content loading</p>
          </div>
          <footer class="course-player-footer">
            <button type="button" id="course-mark-complete" class="course-btn course-btn-primary" hidden>Continue</button>
          </footer>
        </div>
      </div>
    </div>
    <script type="module" src="/src/course/main.ts"></script>
  </body>
</html>
